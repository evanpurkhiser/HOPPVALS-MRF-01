name: firmware

# Build the ESP-IDF (C++) firmware and upload a complete flashable binary set.

on:
  push:
    paths:
      - "firmware/**"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/firmware.yml"
  workflow_dispatch:

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32c6
          path: firmware

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: blinds-firmware
          path: |
            firmware/build/blinds.bin
            firmware/build/blinds.elf
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin
