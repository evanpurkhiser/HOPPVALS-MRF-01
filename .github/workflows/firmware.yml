name: firmware

# Build the ESP-IDF (C++) firmware and upload a complete flashable binary set.

on:
  push:
    paths:
      - "firmware/**"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/firmware.yml"
  workflow_dispatch:

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@9d38657f3d789ca759b2b37aaf5ceffbc42c4f0d # v1
        with:
          esp_idf_version: v5.3.2
          target: esp32c6
          path: firmware

      - name: Upload firmware binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hv-mrf-01-firmware
          path: |
            firmware/build/hv-mrf-01.bin
            firmware/build/hv-mrf-01.elf
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin
